<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOY // MASTER VDJ VISUALS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #controls { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; opacity: 0; transition: opacity 0.3s; }
        body:hover #controls { opacity: 1; }
        button { background: rgba(0, 255, 0, 0.1); border: 1px solid #00FF00; color: #00FF00; padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        button:hover { background: #00FF00; color: #000; }
        #status { position: fixed; bottom: 20px; right: 20px; color: #00FF00; font-size: 10px; opacity: 0.5; z-index: 100; }
    </style>
</head>
<body>
    <div id="controls">
        <button onclick="setMode('grid')">Neural Grid</button>
        <button onclick="setMode('core')">The Core</button>
        <button onclick="toggleGlitch()">Glitch: ON</button>
    </div>
    <div id="status">SHOY // VDJ_MASTER_V1 // MODE: <span id="mode-text">GRID</span></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, time = 0, mode = 'grid', glitchEnabled = true;

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function setMode(m) { mode = m; document.getElementById('mode-text').innerText = m.toUpperCase(); }
        function toggleGlitch() { glitchEnabled = !glitchEnabled; event.target.innerText = `Glitch: ${glitchEnabled ? 'ON' : 'OFF'}`; }

        function drawGrid(t) {
            ctx.strokeStyle = '#00FF00';
            ctx.lineWidth = 0.5;
            const spacing = 40;
            for(let x=0; x<width; x+=spacing) {
                ctx.beginPath(); ctx.globalAlpha = 0.1 + Math.sin(t + x*0.01)*0.05;
                ctx.moveTo(x, 0); ctx.lineTo(x + Math.sin(t + x*0.01)*20, height); ctx.stroke();
            }
            for(let y=0; y<height; y+=spacing) {
                ctx.beginPath(); ctx.globalAlpha = 0.1 + Math.cos(t + y*0.01)*0.05;
                ctx.moveTo(0, y); ctx.lineTo(width, y + Math.cos(t + y*0.01)*20); ctx.stroke();
            }
        }

        function drawCore(t) {
            ctx.save(); ctx.translate(width/2, height/2); ctx.rotate(t*0.5);
            ctx.strokeStyle = '#00FF00'; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
            const r = 150 + Math.sin(t*4)*30;
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                const a = (i/6)*Math.PI*2; const x = Math.cos(a)*r*0.7; const y = Math.sin(a)*r*0.7;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.stroke();
            ctx.restore();
        }

        function animate() {
            time += 0.02;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            if(glitchEnabled && Math.random() > 0.98) {
                ctx.fillStyle = '#00FF00'; ctx.globalAlpha = 0.05;
                ctx.fillRect(0, Math.random()*height, width, Math.random()*100);
            }

            if(mode === 'grid') drawGrid(time);
            else drawCore(time);

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
